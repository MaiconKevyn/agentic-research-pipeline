services:
  backend:
    profiles: ["production"]
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: research-agent-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      API_HOST: 0.0.0.0
      API_PORT: 8000
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  ingestion-worker:
    profiles: ["production"]
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: research-agent-ingestion-worker
    restart: unless-stopped
    command: ["python", "-m", "backend.app.workers.ingestion_worker"]
    env_file:
      - .env
    environment:
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
    volumes:
      - ./data/raw:/app/data/raw:ro
      - ./ingestion_reports:/app/ingestion_reports
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: pgvector/pgvector:pg16
    container_name: research-agent-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-research_agent}
      POSTGRES_USER: ${DATABASE_USER:-postgres}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-postgres}
    ports:
      - "${DATABASE_PORT:-55432}:5432"
    volumes:
      - research_agent_pgdata:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DATABASE_USER:-postgres} -d ${DATABASE_NAME:-research_agent}"
        ]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  research_agent_pgdata:
