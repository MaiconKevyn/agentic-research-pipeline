services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: research-agent-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-research_agent}
      POSTGRES_USER: ${DATABASE_USER:-postgres}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-postgres}
    ports:
      - "${DATABASE_PORT:-55432}:5432"
    volumes:
      - research_agent_pgdata:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${DATABASE_USER:-postgres} -d ${DATABASE_NAME:-research_agent}"
        ]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  research_agent_pgdata:
